# ─── Nginx Reverse Proxy — точка проверки mTLS ──────────────────────────────
#
# Роль: единственная точка входа для запросов от API Gateway к лабораторным сервисам.
#
# Схема работы:
# 1. API Gateway отправляет HTTPS-запрос, предъявляя клиентский сертификат
# 2. Nginx проверяет клиентский сертификат (ssl_verify_client on)
#    — если сертификат не подписан нашим CA → 400 Bad Request
#    — если сертификат валиден → запрос пропускается
# 3. Nginx снимает TLS и проксирует plain HTTP запрос к контейнеру лабы
#    — лабы работают по HTTP внутри доверенной Docker-сети
# 4. Лаба проверяет сервисный JWT в заголовке Authorization
#
# Контейнер cert-init создаёт:
#   ca.crt       — корневой CA (подписывает server и client сертификаты)
#   server.crt   — сертификат nginx (CN=nginx)
#   client.crt   — сертификат gateway (CN=gateway)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name nginx;

    # Сертификат сервера (nginx предъявляет его gateway при TLS-рукопожатии)
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # CA-сертификат для проверки клиентских сертификатов
    # nginx доверяет только сертификатам, подписанным этим CA
    ssl_client_certificate /etc/nginx/certs/ca.crt;

    # ВКЛЮЧИТЬ взаимную проверку: без валидного клиентского сертификата → 400
    ssl_verify_client on;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ─── Маршрутизация к лабораторным сервисам ───────────────────────────
    # После успешной mTLS-проверки nginx проксирует HTTP-запрос к лабам
    # /lab1/ → lab1:8001, /lab2/ → lab2:8002, /lab3/ → lab3:8003

    location /lab1/ {
        proxy_pass http://lab1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 600s;
    }

    location /lab2/ {
        proxy_pass http://lab2:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 600s;
    }

    location /lab3/ {
        proxy_pass http://lab3:8003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 600s;
    }
}
